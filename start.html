<!DOCTYPE html>
<html>
<head>
    <title>더치택시</title>
    <meta charset="utf-8">
    <style>
    body{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }
    hr {
        width : 100%;
        height : 0px;
    }
    .center {
        text-align: center;

    }
    .main {
        text-align: center;
        position: relative;
    }
    .action-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top:20px
    }
    .button {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px 30px;
        border: none;
        outline: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.2s ease;
    }
    .primary {
        background-color:dodgerblue;
        color: white;
    }
    .button i {
        font-size: 24px;
        margin-bottom: 5px;
    }
    .button:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15) ;
    }
    </style>
</head>
<body>

    <div class="center">
        <h1>
        <a href="index.html">
            더치택시
        </a>
        </h1>
    <hr>

    </div>
    <div class="main">
        <img src="taxi.jpg" width = "20%" alt="더치택시 로고">
        <div class = "action-buttons">
            <button class="button primary" onclick="taxi()">
                <i class="icon-matching"></i>
                <span>매칭 시작</span>
            </button>
        </div>

    </div>
    <script src="./dist/address.js"></script>
</body>
</html>
